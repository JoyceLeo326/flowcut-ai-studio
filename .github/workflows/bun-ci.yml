name: FlowCut CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flowcut-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test AI edit planning
        run: bun test apps/web/src/ai-edit

      - name: Build web app
        run: bun run build:web
